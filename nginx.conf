server {

    server_name cognicv.101software.site;

    gzip on;
    gzip_proxied any;
    gzip_types application/javascript application/x-javascript text/css text/javascript;
    gzip_comp_level 5;
    gzip_buffers 16 8k;
    gzip_min_length 256;

    location /_next/static/ {
                alias /var/www/cognicv.101software.site/client/.next/static/;
                expires 365d;
                access_log off;
        }

    # to Backend server
    location /api {
    	proxy_pass http://127.0.0.1:9992;
    	proxy_set_header Host $host;  # Prkeserve the host header
    	proxy_set_header X-Real-IP $remote_addr;  # Get the real IP
    	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # Add forwarded for IPs
    	proxy_set_header X-Forwarded-Proto $scheme;  # Preserve the scheme (http/https)

    	add_header 'Access-Control-Allow-Origin' 'https://cognicv.101software.site';
    	add_header 'Access-Control-Allow-Credentials' 'true';
    	add_header 'Access-Control-Allow-Methods' 'GET,DELETE,PUT,POST,OPTIONS';
    	add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
    }

     # Nextjs server
     location / {
                proxy_pass http://127.0.0.1:9991;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_cache_bypass $http_upgrade;
        }

}